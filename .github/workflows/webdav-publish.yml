name: Deploy to WebDAV

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        env:
          VITE_BASE_URL: '/online/${{ github.event.repository.name }}/'
          
      - name: Upload to WebDAV
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          curl -v -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            -X MKCOL "$WEBDAV_URL/online/" 2>/dev/null || true
          
          curl -v -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            -X MKCOL "$WEBDAV_URL/online/${{ github.event.repository.name }}/" 2>/dev/null || true
          
          for file in $(find dist -type f); do
            relative_path="${file#dist/}"
            remote_path="$WEBDAV_URL/online/${{ github.event.repository.name }}/$relative_path"
            
            echo "Uploading: $file -> $remote_path"
            
            parent_dir=$(dirname "$remote_path")
            curl -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
              -X MKCOL "$parent_dir/" 2>/dev/null || true
              
            curl -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
              -T "$file" "$remote_path"
          done
          
      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Repository: ${{ github.event.repository.name }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: ${{ secrets.WEBDAV_URL }}/online/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
